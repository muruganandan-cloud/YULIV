{% extends "base.html" %}
{% block content %}
<div class="content" style="max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 12px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="color: #0d9488; margin-bottom: 20px; font-size: 2rem;">Returns & Orders</h2>
    <p style="font-size: 1.1rem; color: #555;">You currently have no past orders.</p>
    
    <div style="margin-top: 30px; padding: 30px; border: 2px dashed #eaeaea; border-radius: 8px; text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 10px;">📦</div>
        <p style="color: #888;">When you place an order, it will appear here so you can easily track it or <strong>Buy Again</strong>.</p>
        <a href="/" style="display: inline-block; margin-top: 15px; color: #ff6600; font-weight: bold; text-decoration: none; border: 1px solid #ff6600; padding: 8px 16px; border-radius: 20px;">Start Shopping ➔</a>
    </div>
</div>
{% endblock %}
