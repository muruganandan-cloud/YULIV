{% extends "base.html" %}
{% block content %}
<div class="content" style="max-width: 800px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 12px; text-align: left; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h2 style="color: #0d9488; margin-bottom: 20px; font-size: 2rem;">Your Account Profile</h2>
    <p style="font-size: 1.1rem; color: #555;">Hello, <strong>{{ current_user.username }}</strong>!</p>
    
    <p style="color: #666; margin-top: 20px;"><strong>Saved Pincode:</strong> {{ current_user.pincode if current_user.pincode else 'No pincode saved' }}</p>
    
    <a href="{{ url_for('logout') }}" style="display: inline-block; margin-top: 30px; padding: 10px 20px; background: #dc2626; color: white; border-radius: 6px; text-decoration: none; font-weight: bold;">Sign Out</a>
</div>
{% endblock %}
